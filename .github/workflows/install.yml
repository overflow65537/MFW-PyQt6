name: install

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi
          if ! $is_release ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "is_release=$is_release" >> $GITHUB_OUTPUT
        shell: bash

      # 与 main 一致：供 Linux/macOS PyInstaller 步骤下载 app/i18n
      - name: Set up Python (meta i18n)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install PySide6
        run: |
          python -m pip install --upgrade pip
          python -m pip install PySide6

      - name: lrelease i18n
        run: python ./tools/lrelease.py

      - name: Upload i18n
        uses: actions/upload-artifact@v4
        with:
          name: i18n
          path: app/i18n

    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}

  # Windows：保持 Nuitka（与此前 ci-nuitka 一致）
  nuitka:
    needs: meta
    name: nuitka Build (win-${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: win
            runs-on: windows-latest
            arch: x86_64
            python_arch: x64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist
          - platform: win
            runs-on: windows-11-arm
            arch: aarch64
            python_arch: arm64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist

      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      - name: Install Python dependencies (Windows ARM64)
        if: matrix.platform == 'win' && matrix.arch == 'aarch64'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install openssl:arm64-windows-static-md

          $opensslRoot = "$env:GITHUB_WORKSPACE\vcpkg\installed\arm64-windows-static-md"
          $env:VCPKG_ROOT = "$env:GITHUB_WORKSPACE\vcpkg"
          $env:OPENSSL_DIR = $opensslRoot
          $env:OPENSSL_LIB_DIR = "$opensslRoot\lib"
          $env:OPENSSL_INCLUDE_DIR = "$opensslRoot\include"

          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:VCPKG_ROOT"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_DIR=$env:OPENSSL_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_LIB_DIR=$env:OPENSSL_LIB_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_INCLUDE_DIR=$env:OPENSSL_INCLUDE_DIR"

          python -m pip install --upgrade pip
          python -m pip install setuptools wheel maturin
          python -m pip install -r requirements.txt

      - name: Install Python dependencies
        if: ${{ !(matrix.platform == 'win' && matrix.arch == 'aarch64') }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Download i18n
        uses: actions/download-artifact@v4
        with:
          name: i18n
          path: app/i18n

      - name: updater build
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: updater.py
          mode: standalone
          windows-console-mode: force

      - name: Qt GUI with PySide6
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: ${{ matrix.nuitka_main_mode }}
          enable-plugins: pyside6
          windows-console-mode: force
          windows-icon-from-ico: ./app/assets/icons/logo.ico

      - name: Assemble distribution (Nuitka post-build)
        run: |
          python tools/build_nuitka.py ${{ matrix.platform }} ${{ matrix.arch }} ${{ needs.meta.outputs.tag }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFW-PyQt6-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.nuitka_artifact }}
          include-hidden-files: true

  # Linux / macOS：与 main 分支一致，使用 PyInstaller + tools/build.py
  pyinstaller_linux_macos:
    needs: meta
    name: PyInstaller (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: macos-15-intel
            platform: macos
            arch: x86_64
            python_arch: x64

          - os: macos-latest
            platform: macos
            arch: aarch64
            python_arch: arm64

          - os: ubuntu-latest
            platform: linux
            arch: x86_64
            python_arch: x64

          - os: ubuntu-24.04-arm
            platform: linux
            arch: aarch64
            python_arch: arm64

      fail-fast: false

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      - name: Install dependencies (macOS)
        if: matrix.platform == 'macos'
        run: |
          uname -m
          if [[ ${{ matrix.arch }} == "x86_64" ]]; then
            arch -x86_64 python -m pip install --force-reinstall --no-cache-dir pyinstaller -r requirements.txt
          elif [[ ${{ matrix.arch }} == "aarch64" ]]; then
            arch -arm64 python -m pip install --force-reinstall --no-cache-dir pyinstaller -r requirements.txt
          fi

      - name: Install dependencies (Linux)
        if: matrix.platform == 'linux'
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyinstaller
          python -m pip install -r requirements.txt

      - name: Download i18n
        uses: actions/download-artifact@v4
        with:
          name: i18n
          path: app/i18n

      - name: Build (macOS)
        if: matrix.platform == 'macos'
        run: sudo python ./tools/build.py ${{ matrix.platform }} ${{ matrix.arch }} ${{ needs.meta.outputs.tag }}

      - name: Build (Linux)
        if: matrix.platform == 'linux'
        run: python ./tools/build.py ${{ matrix.platform }} ${{ matrix.arch }} ${{ needs.meta.outputs.tag }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFW-PyQt6-${{ matrix.platform }}-${{ matrix.arch }}
          path: "dist/MFW/"
          include-hidden-files: true

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, nuitka, pyinstaller_linux_macos, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            if [ "$f" != "i18n" ]; then
              (cd $f && zip -r -9 ../$f-${{ needs.meta.outputs.tag }}.zip .)
            fi
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: false

      - name: Trigger MirrorChyanUploading
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
