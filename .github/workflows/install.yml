name: install

on:
  push:
    tags:
      - "v*"
  pull_request:  
    branches:    
      - main    
  workflow_dispatch:

jobs:

  changelog:
    name: Generate changelog
    runs-on: ubuntu-latest
    outputs:
      release_body: ${{ steps.git-cliff.outputs.content }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate a changelog
        uses: orhun/git-cliff-action@v4
        id: git-cliff
        with:
          config: cliff.toml
          args: -vv --latest --strip header
        env:
          OUTPUT: CHANGES.md
          GITHUB_REPO: ${{ github.repository }}

  meta:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - id: set_tag
        run: |
          is_release=${{ startsWith(github.ref, 'refs/tags/v') }}
          tag=$(git describe --tags --match "v*" ${{ github.ref }} || true)
          if [[ $tag != v* ]]; then
            tag=$(curl -sX GET "https://api.github.com/repos/${{ github.repository }}/releases/latest" --header 'authorization: Bearer ${{ secrets.GITHUB_TOKEN }}' | awk '/tag_name/{print $4}' FS='["]')
            if [[ $tag != v* ]]; then
              tag="v0.0.0"
            fi
            tag=$(date "+$tag-%y%m%d-$(git rev-parse --short HEAD)")
          fi
          if ! $is_release ; then
            prefix=${tag%-*-*}
            suffix=${tag#$prefix-}
            tag="$prefix-ci.$suffix"
          fi

          echo "tag=$tag" >> $GITHUB_OUTPUT
          echo "is_release=$is_release" >> $GITHUB_OUTPUT
        shell: bash

    outputs:
      tag: ${{ steps.set_tag.outputs.tag }}
      is_release: ${{ steps.set_tag.outputs.is_release }}

  nuitka:
    needs: meta
    name: nuitka Build (${{ matrix.platform }}-${{ matrix.arch }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      matrix:
        include:
          - platform: win
            runs-on: windows-latest
            arch: x86_64
            python_arch: x64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist
          - platform: win
            runs-on: windows-11-arm
            arch: aarch64
            python_arch: arm64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist
          - platform: linux
            runs-on: ubuntu-latest
            arch: x86_64
            python_arch: x64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist
          - platform: linux
            runs-on: ubuntu-24.04-arm
            arch: aarch64
            python_arch: arm64
            nuitka_main_mode: standalone
            nuitka_artifact: build/main.dist
          - platform: macos
            runs-on: macos-latest
            arch: aarch64
            python_arch: arm64
            nuitka_main_mode: app-dist
            nuitka_artifact: build/main.app
          - platform: macos
            runs-on: macos-15-intel
            arch: x86_64
            python_arch: x64
            nuitka_main_mode: app-dist
            nuitka_artifact: build/main.app

      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          architecture: ${{ matrix.python_arch }}

      # 与历史提交 1286712 一致：Win ARM64 无 cryptography 预编译轮子时，用 vcpkg 提供 OpenSSL 再构建
      - name: Install Python dependencies (Windows ARM64)
        if: matrix.platform == 'win' && matrix.arch == 'aarch64'
        shell: pwsh
        run: |
          git clone --depth 1 https://github.com/microsoft/vcpkg.git "$env:GITHUB_WORKSPACE\vcpkg"
          & "$env:GITHUB_WORKSPACE\vcpkg\bootstrap-vcpkg.bat"
          & "$env:GITHUB_WORKSPACE\vcpkg\vcpkg.exe" install openssl:arm64-windows-static-md

          $opensslRoot = "$env:GITHUB_WORKSPACE\vcpkg\installed\arm64-windows-static-md"
          $env:VCPKG_ROOT = "$env:GITHUB_WORKSPACE\vcpkg"
          $env:OPENSSL_DIR = $opensslRoot
          $env:OPENSSL_LIB_DIR = "$opensslRoot\lib"
          $env:OPENSSL_INCLUDE_DIR = "$opensslRoot\include"

          # GITHUB_ENV 仅对「后续」步骤生效；同一步内的 pip/maturin 必须依赖上面的 $env:
          Add-Content -Path $env:GITHUB_ENV -Value "VCPKG_ROOT=$env:VCPKG_ROOT"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_DIR=$env:OPENSSL_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_LIB_DIR=$env:OPENSSL_LIB_DIR"
          Add-Content -Path $env:GITHUB_ENV -Value "OPENSSL_INCLUDE_DIR=$env:OPENSSL_INCLUDE_DIR"

          python -m pip install --upgrade pip
          python -m pip install setuptools wheel maturin
          python -m pip install -r requirements.txt

      - name: Install Python dependencies
        if: ${{ !(matrix.platform == 'win' && matrix.arch == 'aarch64') }}
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: updater build
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: updater.py
          mode: standalone

      - name: Install imageio (Nuitka macOS PNG app icon)
        if: matrix.platform == 'macos'
        run: python -m pip install imageio

      - name: Qt GUI with PySide6
        uses: Nuitka/Nuitka-Action@main
        with:
          nuitka-version: main
          script-name: main.py
          mode: ${{ matrix.nuitka_main_mode }}
          enable-plugins: pyside6
          windows-console-mode: disable
          windows-icon-from-ico: ./app/assets/icons/logo.ico
          linux-icon: ./app/assets/icons/logo.png
          macos-app-icon: ./app/assets/icons/logo.png

      - name: Assemble distribution (Nuitka post-build)
        run: |
          python tools/build_nuitka.py ${{ matrix.platform }} ${{ matrix.arch }} ${{ needs.meta.outputs.tag }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MFW-PyQt6-${{ matrix.platform }}-${{ matrix.arch }}
          path: ${{ matrix.nuitka_artifact }}
          include-hidden-files: true

  release:
    if: ${{ needs.meta.outputs.is_release == 'true' }}
    needs: [meta, nuitka, changelog]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: assets

      - run: |
          cd assets
          for f in *; do
            (cd $f && zip -r -9 ../$f-${{ needs.meta.outputs.tag }}.zip .)
          done

      - uses: softprops/action-gh-release@v2
        with:
          files: assets/*
          tag_name: ${{ needs.meta.outputs.tag }}
          body: ${{ needs.changelog.outputs.release_body }}
          draft: false
          prerelease: false

      - name: Trigger MirrorChyanUploading
        run: |
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan
          gh workflow run --repo $GITHUB_REPOSITORY mirrorchyan_release_note
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}